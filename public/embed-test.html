<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Davis Embed Test — 毛安住整合測試</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { color: #0B1E3D; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .controls input, .controls select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .controls button { padding: 8px 16px; background: #1A4A9E; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .controls button:hover { background: #0B1E3D; }
    .iframe-wrapper { border: 2px solid #1A4A9E; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 20px; }
    iframe { width: 100%; height: 600px; border: none; }
    .log { background: #0B1E3D; color: #0f0; padding: 16px; border-radius: 12px; font-family: monospace; font-size: 13px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
    .log-title { color: #D4A843; font-weight: bold; margin-bottom: 8px; display: block; }
    .log-entry { border-bottom: 1px solid #1a3a5a; padding: 8px 0; }
    .log-entry:last-child { border-bottom: none; }
    .status { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .status.ready { background: #22c55e; color: #fff; }
    .status.waiting { background: #eab308; color: #000; }
  </style>
</head>
<body>
  <h1>Davis Embed Test</h1>
  <p class="subtitle">模擬毛安住系統嵌入 Davis AI 洗護顧問</p>

  <div class="controls">
    <input id="breed" type="text" value="貴賓犬" placeholder="品種">
    <input id="weight" type="number" value="5" placeholder="體重(kg)" style="width:80px">
    <input id="store_name" type="text" value="毛安住" placeholder="店名">
    <input id="pet_name" type="text" value="Lucky" placeholder="寵物名">
    <select id="lang">
      <option value="zh-TW">繁中</option>
      <option value="zh-CN">简中</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
    </select>
    <button onclick="loadEmbed()">載入 iframe</button>
  </div>

  <p>狀態: <span id="status" class="status waiting">等待中</span></p>

  <div class="iframe-wrapper" style="margin-top: 12px;">
    <iframe id="embed-frame" src="about:blank"></iframe>
  </div>

  <div class="log">
    <span class="log-title">postMessage 日誌</span>
    <div id="log-entries"></div>
  </div>

  <script>
    function loadEmbed() {
      const breed = document.getElementById('breed').value;
      const weight = document.getElementById('weight').value;
      const store_name = document.getElementById('store_name').value;
      const pet_name = document.getElementById('pet_name').value;
      const lang = document.getElementById('lang').value;

      const params = new URLSearchParams({
        embed: 'true',
        breed,
        weight,
        hotel: 'maoanzu',
        store_name,
        pet_name,
        lang,
      });

      // Use relative URL (same origin)
      const url = '/analyze?' + params.toString();
      document.getElementById('embed-frame').src = url;
      document.getElementById('status').textContent = '載入中...';
      document.getElementById('status').className = 'status waiting';
      addLog('system', 'iframe 載入: ' + url);
    }

    function addLog(type, data) {
      const el = document.getElementById('log-entries');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      const time = new Date().toLocaleTimeString();
      if (typeof data === 'object') data = JSON.stringify(data, null, 2);
      entry.textContent = `[${time}] [${type}] ${data}`;
      el.insertBefore(entry, el.firstChild);
    }

    window.addEventListener('message', function(event) {
      // Log all messages
      addLog('message', event.data);

      if (event.data && event.data.source === 'davis-grooming-ai') {
        if (event.data.type === 'davis-embed-ready') {
          document.getElementById('status').textContent = 'Ready';
          document.getElementById('status').className = 'status ready';
          addLog('status', 'Embed 已就緒');
        }

        if (event.data.type === 'davis-recommendation') {
          addLog('result', '收到推薦結果:');
          addLog('result', '品種: ' + event.data.breed);
          addLog('result', 'breed_group_id: ' + (event.data.breed_group_id || 'N/A'));
          addLog('result', '毛質分析: ' + event.data.coat_analysis);
          addLog('result', '季節提示: ' + (event.data.season_hint || 'N/A'));
          addLog('result', '推薦等級: ' + event.data.result.recommended);
          addLog('result', '產品數: ' + event.data.result.products.length);
          event.data.result.products.forEach(function(p, i) {
            addLog('product', 'Step ' + (i+1) + ': ' + p.name + ' (' + p.dilution + ', ' + p.dwell_time + ')');
          });
        }
      }
    });

    // Auto-load on page ready
    loadEmbed();
  </script>
</body>
</html>
